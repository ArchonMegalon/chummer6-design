name: Weekly Product Pulse

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout design
        uses: actions/checkout@v4
        with:
          path: design
          fetch-depth: 0

      - name: Checkout fleet
        uses: actions/checkout@v4
        with:
          repository: ArchonMegalon/fleet
          path: fleet
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Materialize weekly pulse
        run: |
          bash design/scripts/ai/materialize_weekly_product_pulse.sh "$GITHUB_WORKSPACE/fleet" "$(date -u +%F)"

      - name: Verify design canon
        working-directory: design
        run: bash scripts/ai/verify.sh

      - name: Commit refreshed pulse
        working-directory: design
        run: |
          if git diff --quiet -- products/chummer/PROGRESS_REPORT.generated.json products/chummer/PROGRESS_REPORT.generated.html products/chummer/PROGRESS_REPORT_POSTER.svg products/chummer/PROGRESS_HISTORY.generated.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add products/chummer/PROGRESS_REPORT.generated.json products/chummer/PROGRESS_REPORT.generated.html products/chummer/PROGRESS_REPORT_POSTER.svg products/chummer/PROGRESS_HISTORY.generated.json
          git commit -m "chore(design): refresh weekly product pulse"
          git push
