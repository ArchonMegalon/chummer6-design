product: chummer
surface: chummer.run
version: 1
mode: raster_campaign_only
style_anchor: |
  Premium product campaign image for a cyberpunk-fantasy tabletop assistant, grounded cinematic realism, dark blue and steel palette, rain on glass, polished workstation surfaces, subtle holographic overlays, restrained neon, believable human or metahuman presence, high-end commercial photography plus light VFX, trustworthy and professional, one clear focal subject, strong negative space for web copy, premium SaaS launch quality, no text, no logos, no visible UI labels, no vector art, no illustration, no anime, no comic-book style.
negative_prompt: |
  vector art, svg style, flat illustration, cartoon, anime, comic, painterly, generic skyline, empty hallway, empty stairs, stock photo smile, cosplay armor, excessive magenta or purple, cluttered collage, readable text, watermarks, logos, labels, fake UI text, deformed hands, extra fingers, duplicate limbs, bad anatomy, warped face, blurry, low resolution, oversharpened, heavy grain, posterized lighting, fisheye distortion
output_rules:
  raster_only: true
  no_svg: true
  master_format: png
  derivatives:
    - avif
    - webp
  minimum_long_side_px: 2400
  no_text_baked_into_images: true
  no_logos: true
  blue_first_palette: true
  reserve_negative_space: 30_to_40_percent
  focal_subject_count: 1
  preferred_lenses:
    - 35mm_cinematic
    - 50mm_cinematic
  palette:
    - cobalt_blue
    - deep_navy
    - steel_gray
    - tiny_amber_status_accents_only
    - tiny_green_verified_accents_only
assets:
  - id: hero_shadowrun_assistant_nightdesk
    filename_base: hero-shadowrun-assistant-nightdesk
    runtime_targets:
      - landing.hero
      - home.hero
      - section_hero
    aspect_ratio: 16:9
    mobile_safe_crop: 4:5
    long_side_px: 2560
    negative_space: left_40
    prompt: |
      Interior night. A calm professional operator at a sleek desk in front of a rain-streaked window overlooking a vast blue-lit sprawl. On the desk: a printed dossier, translucent map overlays, character build fragments, gear silhouettes, a few dice, and subtle evidence markers. The operator is mid-analysis, hand hovering above a glass surface as if using an intelligent assistant. Subtle metahuman cues are welcome, like a pointed ear or understated tusks, but the look must stay elegant and believable. Strong negative space on the left for a large product wordmark and headline. Cinematic, premium, serious, cool, confident, product-launch quality.
  - id: capability_build_runner
    filename_base: capability-build-runner
    runtime_targets:
      - landing.start_here.product_story
      - capability_build_runner
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_35
    prompt: |
      A focused assistant workspace showing a legal runner build coming together: cyberware diagrams, weapon silhouettes, identity fragments, bioware hints, translucent stat-like tiles, and source receipt markers arranged above a glass table. A professional user reviews options with a calm, analytical posture. The mood is product-grade and trustworthy, not chaotic. Blue-toned, crisp, premium, with subtle metahuman detail and no readable text.
  - id: capability_check_rules
    filename_base: capability-check-rules
    runtime_targets:
      - story.lead
      - landing.start_here.real_now
      - capability_check_rules
      - scene_archive_stair
      - scene_simulation_bench
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_35
    prompt: |
      A rules-verification scene at a noir desk: open source materials with unreadable pages, thin citation-like light lines connecting fragments, a hand tracing a highlighted rules excerpt, translucent evidence tabs, dice, notes, and cross-check markers. The assistant feels precise and reliable, like legal-grade source verification for a tabletop RPG session. Dark blue with restrained ice-blue highlights, premium commercial realism, no readable text.
  - id: capability_brief_run
    filename_base: capability-brief-run
    runtime_targets:
      - scene_dossier_desk
      - lane_gm
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_35
    prompt: |
      A mission-briefing setup for tonight’s run: district map overlays, contact photos with unreadable labels, route lines, threat markers, timeline strips, and a compact dossier spread across a glass planning table. One composed operator studies the plan while blue city light spills through wet windows. This must feel like a serious assistant preparing a run, not an action scene. Premium, sharp, elegant, product-pitch quality.
  - id: capability_carry_dossier
    filename_base: capability-carry-dossier
    runtime_targets:
      - scene_streetfront
      - continuity.support
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_35
    prompt: |
      A continuity scene showing the same mission dossier flowing across desktop and mobile devices without using readable UI text. A user closes a slim laptop while checking a handheld device in a rain-lit transit setting. The desk or seat area shows a few dossier papers, a compact comms device, and subtle linked overlays that imply continuity and persistence. Calm, premium, useful, believable, elegant.
  - id: auth_entry_blueglass
    filename_base: auth-entry-blueglass
    runtime_targets:
      - auth.entry_visual
      - auth.signup_visual
    aspect_ratio: 16:10
    mobile_safe_crop: vertical
    long_side_px: 2560
    negative_space: right_40
    prompt: |
      A sleek blue-glass access environment for signing into a high-trust assistant: one composed person entering a dimly lit operations lobby or sitting down at a secure desk, with translucent identity panels and subtle credential-light effects in the background. The scene should feel premium, private, and aspirational. Strong empty space on the right for a sign-in panel. No readable UI. No sci-fi gimmicks.
  - id: participation_ops_lane
    filename_base: participation-ops-lane
    runtime_targets:
      - participate.hero
      - participate.signed_in_lane
      - scene_solo_operator
    aspect_ratio: 16:10
    long_side_px: 2560
    negative_space: left_35
    prompt: |
      A contributor opening a secure operations lane for a project assistant: one user at a clean desk with laptop and phone, a subtle authorization glow between devices, a mission folder nearby, and light evidence lines suggesting a temporary secure session. This should feel like contributing to a real product, not hacking or chaos. Blue, disciplined, confident, premium, calm.
  - id: lane_player
    filename_base: lane-player
    runtime_targets:
      - landing.choose_your_lane.player
      - lane_player
    aspect_ratio: 5:4
    long_side_px: 2500
    negative_space: side_35
    prompt: |
      A player-focused scene: one runner preparing for a session with calm focus, reviewing a character dossier, gear plan, and a few abstract build overlays on a desk or booth table. Subtle cyberware detail, subtle metahuman hint, and a sense of personal preparation. It should feel smart and capable, not violent. Premium and human.
  - id: lane_gm
    filename_base: lane-gm
    runtime_targets:
      - landing.choose_your_lane.gm
      - lane_gm
    aspect_ratio: 5:4
    long_side_px: 2500
    negative_space: side_35
    prompt: |
      A GM-focused planning scene: a composed game master or operator at a planning wall or large table with district map fragments, threat markers, contact photos, route overlays, and session prep materials. It must feel like intelligent orchestration for a run, not military command fantasy. Elegant, restrained, blue-lit, trustworthy.
  - id: lane_creator
    filename_base: lane-creator
    runtime_targets:
      - landing.choose_your_lane.creator
      - lane_creator
      - scene_prop_cluster
    aspect_ratio: 5:4
    long_side_px: 2500
    negative_space: side_35
    prompt: |
      A creator-focused scene: one careful builder or curator refining rules content, package fragments, media elements, and receipt-linked artifacts at a modern workstation. The mood is stewardship and craft, not coding cliché. Blue-glass light, clean desk, subtle overlays, premium product-pitch quality.
  - id: future_blue_boulevard
    filename_base: future-blue-boulevard
    runtime_targets:
      - scene_boulevard_of_futures
      - horizons.future_bands
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_35
    prompt: |
      A premium product-futures scene for a cyberpunk-fantasy tabletop assistant: rain-slick boulevard reflections, elegant transport light, distant district markers, and subtle planning overlays that imply the next product lanes opening up. Keep the mood disciplined and product-led, not entertainment poster art. Blue-first, cinematic, credible, and calm.
  - id: release_current_build
    filename_base: release-current-build
    runtime_targets:
      - landing.start_here.downloads
      - downloads.release_shelf
      - scene_facility_exterior
    aspect_ratio: 3:2
    long_side_px: 2400
    negative_space: side_35
    prompt: |
      A premium release-shelf scene for a cyberpunk-fantasy tabletop assistant: sealed build packages, integrity markers, polished workstation surfaces, and a disciplined shipping environment with subtle blue logistics light. It should feel like a trustworthy software release shelf, not warehouse cosplay and not an artifact dump.
