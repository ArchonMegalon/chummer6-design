product: chummer
version: 1
last_reviewed: 2026-04-12
purpose: Release-facing parity truth for judging whether Chummer6 is a flagship replacement that veteran Chummer5a users can trust.
source_documents:
  - LEGACY_CLIENT_AND_ADJACENT_PARITY.md
  - LEGACY_CLIENT_AND_ADJACENT_PARITY_REGISTRY.yaml
  - CHUMMER5A_FAMILIARITY_BRIDGE.md
  - FLAGSHIP_RELEASE_ACCEPTANCE.yaml
  - FLAGSHIP_UI_RELEASE_GATE.md
status_scale:
  - id: documented
    release_blocking: true
    meaning: Canon names the family and the replacement intent, but there is no trustworthy release proof yet.
  - id: implemented
    release_blocking: true
    meaning: A modern successor route exists in code or product surfaces, but task proof and veteran trust proof are still incomplete.
  - id: task_proven
    release_blocking: true
    meaning: Representative tasks execute and persist correctly, but veteran acceptance and screenshot trust are still incomplete.
  - id: veteran_approved
    release_blocking: true
    meaning: Veteran-orientation, screenshot, and task-speed proof are current enough to support a serious replacement claim.
  - id: gold_ready
    release_blocking: false
    meaning: The family is task-proven, veteran-approved, and packaged inside a release lane that can honestly claim flagship replacement quality.
policy:
  covered_is_not_done:
    - Legacy parity `covered` means the successor route is explicit in canon or bounded proof.
    - Release truth for flagship replacement is tracked here, not in the softer `covered` field.
    - Gold release claims require this registry, not only the legacy parity registry, to be green for every in-scope family.
  oracle_rule:
    - "`chummer5a` is the default legacy oracle for screenshot, workflow, and first-minute orientation evidence."
    - Chummer4 remains the stronger SR4 workflow oracle where canon already says it should.
families:
  - id: shell_workbench_orientation
    legacy_parity_status: covered
    release_status: task_proven
    owner_repos:
      - chummer6-design
      - chummer6-ui
      - chummer6-ui-kit
      - fleet
    proof_requirements:
      - Veteran first-minute gate
      - Dense workbench budget
      - Desktop visual familiarity exit gate
    blocking_gaps:
      - Veteran-approved screenshot and task-time proof is still incomplete for the promoted desktop route.
  - id: dense_builder_and_career_workflows
    legacy_parity_status: covered
    release_status: task_proven
    owner_repos:
      - chummer6-ui
      - chummer6-core
      - chummer5a
    proof_requirements:
      - Workflow-family execution receipts
      - Chummer5a compare fixtures
      - Veteran task-time benchmarks
    blocking_gaps:
      - Full veteran-approved dense-builder closure is not yet published across the flagship desktop route.
  - id: identity_contacts_lifestyles_history
    legacy_parity_status: covered
    release_status: implemented
    owner_repos:
      - chummer6-ui
      - chummer6-core
