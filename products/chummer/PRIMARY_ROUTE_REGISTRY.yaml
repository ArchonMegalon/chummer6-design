version: 1
last_reviewed: 2026-04-12
purpose: One-primary-route contract for major Chummer jobs so flagship release truth can fail when fallback starts masquerading as the real product.
policy:
  one_primary_route_per_job: true
  fallback_must_be_bounded_and_labeled: true
  release_blocking: true
jobs:
  - id: build_character
    primary_route:
      repo: chummer6-ui
      head: Chummer.Avalonia
      surface: workbench
    fallback_routes:
      - repo: chummer6-ui
        head: Chummer.Blazor.Desktop
        posture: bounded_fallback
        condition: compatibility_only_when_the_release_shelf_and_platform_matrix_label_it_explicitly
  - id: import_and_open_existing_runner
    primary_route:
      repo: chummer6-ui
      head: Chummer.Avalonia
      surface: workbench_file_and_import_flows
    fallback_routes:
      - repo: chummer6-ui
        head: Chummer.Blazor.Desktop
        posture: bounded_fallback
        condition: compatibility_only_when_the_release_shelf_and_platform_matrix_label_it_explicitly
  - id: settings_and_rules_environment_review
    primary_route:
      repo: chummer6-ui
      head: Chummer.Avalonia
      surface: character_settings_and_master_index
    fallback_routes:
      - repo: chummer6-ui
        head: Chummer.Blazor.Desktop
        posture: bounded_fallback
        condition: compatibility_only_when_the_release_shelf_and_platform_matrix_label_it_explicitly
  - id: print_export_and_exchange
    primary_route:
      repo: chummer6-ui
      head: Chummer.Avalonia
      surface: build_lab_and_desktop_export_routes
    fallback_routes:
      - repo: chummer6-ui
        head: Chummer.Blazor.Desktop
        posture: bounded_fallback
        condition: compatibility_only_when_the_release_shelf_and_platform_matrix_label_it_explicitly
  - id: claim_update_and_recovery
    primary_route:
      repo: chummer6-ui
      head: Chummer.Avalonia
      surface: desktop_native_registry_and_support_flows
    fallback_routes:
      - repo: chummer6-hub
        head: web_supporting_surface
        posture: supporting_surface_only
        condition: used_only_when_the_desktop_route_opens_or_completes_the_flow
  - id: support_and_issue_followthrough
    primary_route:
      repo: chummer6-ui
      head: Chummer.Avalonia
      surface: in_app_support_and_report_issue_flows
    fallback_routes:
      - repo: chummer6-hub
        head: web_supporting_surface
        posture: supporting_surface_only
        condition: used_only_when_the_desktop_route_opens_or_completes_the_flow
