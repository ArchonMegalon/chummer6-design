product: chummer
version: 1
last_reviewed: 2026-04-15
program_wave: next_90_day_product_advance
goal: Convert flagship closeout into repeatable desktop release truth, oracle-backed veteran replacement, boring continuity, first-party artifact proof, premium campaign orientation artifacts, deeper campaign operations, stronger Build/Rules/Exchange moat, creator/community publication, public launch health, and a measured product-governor operating cadence over the next quarter.
status: in_progress

activation:
  starts_after:
    - The current full-product flagship closeout frontier reports zero open milestones.
    - FLAGSHIP_PRODUCT_READINESS.generated.json is green for desktop_client and the other flagship readiness planes.
    - The promoted desktop route is honest on Windows, macOS, and Linux.
  control_plane_rule: Launch this wave on spare Fleet shards immediately, but do not let it steal shards already assigned to the current flagship closeout frontier.

ordering_rule:
  - Productionize native-host desktop release and promotion first.
  - Turn Chummer5a parity into oracle-backed release truth second.
  - Make desktop-native trust, recovery, and workspace continuity boring third.
  - Turn release, support, build, campaign, and runsite truth into first-party artifact bundles fourth.
  - Pull the preserved Next Big Wins forward into a broader successor tranche for campaign operations, rules/build/exchange moat, creator/community publication, onboarding, and public launch health.
  - Keep the product-governor loop measured and weekly instead of heroic and ad hoc.

